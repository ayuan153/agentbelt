# Example operator config — a Chipotle-style facsimile (see docs/configurability.md §8).
# Retargeting Agentbelt at another agent = editing THIS file, not the harness.
agent: burritobot

scope:
  charter: "Help customers with menu, ordering, store info, nutrition, and order issues. Nothing else."
  allow_intents: [menu, order_status, place_order, hours_locations, nutrition, refund_request]
  hard_deny: [code_generation, general_knowledge, role_override]
  on_offscope: deflect
  deflect_message: "I can only help with orders and menu questions."
  examples:
    - { text: "is the barbacoa gluten free", label: onscope }
    - { text: "help me write a complaint letter", label: offscope }

budget:
  cost_units_per_window: 50      # per principal per window
  window_seconds: 3600
  output_token_weight: 5         # output tokens cost 5x input (denial-of-wallet control)
  input_token_weight: 1

egress:
  allow_domains: ["burritobot.example"]   # live-validated; no stale domains (ForcedLeak lesson)
  render_links: false                     # neutralize the exfil channel

# Tool sensitivity tiers (H3). Unlisted tools default to "high" (default-sensitive).
# low = read-only; medium = bounded write; high = money/account/irreversible -> needs verification.
tool_tiers:
  get_menu: low
  order_status: low
  place_order: medium
  issue_refund: high
trusted_tool_servers: ["tools.burritobot.internal"]   # whose MCP annotations we'd believe

fail_posture:
  default: closed                # budget/egress fail closed
  scope_check: open_with_alert   # scope classifier errors fail open + alert

risk:                            # multi-turn (Crescendo) session-risk scoring
  threshold: 1.0                 # deflect once accumulated escalation crosses this
  decay: 0.8                     # one-off borderline turns fade; sustained pressure accumulates
  cue_weight: 0.4

upstream_base_url: "https://api.openai.com"
